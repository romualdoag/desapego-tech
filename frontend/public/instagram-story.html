<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Stories Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #09090b;
        }
        .story-canvas {
            width: 1080px;
            height: 1920px;
            background: linear-gradient(180deg, #09090b 0%, #18181b 100%);
            position: relative;
            overflow: hidden;
        }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            padding: 40px;
        }
        .product-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .product-image {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 20px;
            object-fit: cover;
            margin-bottom: 16px;
        }
        .glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.1) 0%, rgba(0,0,0,0) 70%);
            z-index: 0;
        }
    </style>
</head>
<body class="flex items-center justify-center p-10">

    <div id="story" class="story-canvas shadow-2xl flex flex-col">
        <!-- Background Elements -->
        <div class="glow top-[-100px] left-[-100px]"></div>
        <div class="glow bottom-[-100px] right-[-100px]"></div>

        <!-- Header -->
        <div class="relative z-10 pt-32 px-16 text-center">
            <div class="inline-flex items-center gap-3 px-6 py-3 rounded-full bg-blue-500/10 border border-blue-500/20 text-blue-400 font-bold text-2xl mb-8">
                ✨ CURADORIA PREMIUM
            </div>
            <h1 class="text-8xl font-extrabold text-white mb-4 tracking-tight">
                Desapegos <br> <span class="text-blue-500">do Mumu</span>
            </h1>
            <p class="text-3xl text-zinc-400 font-medium max-w-2xl mx-auto">
                Eletrônicos impecáveis com procedência garantida e preços especiais.
            </p>
        </div>

        <!-- Product List -->
        <div class="relative z-10 flex-1 px-12 py-12 flex flex-col justify-center gap-6">
            <!-- Row 1 -->
            <div class="flex gap-8 h-80">
                <div class="flex-1 bg-white/5 border border-white/10 rounded-[48px] p-8 flex items-center gap-8">
                    <img src="https://romualdoag.github.io/desapego-tech/images/mac_mini_m4/IMG_2011.JPEG" class="h-64 aspect-square rounded-[32px] object-cover shadow-2xl">
                    <div class="flex flex-col justify-center">
                        <h3 class="text-4xl font-bold text-white mb-2">Mac Mini M4</h3>
                        <p class="text-3xl text-blue-400 font-extrabold italic">R$ 8.200</p>
                    </div>
                </div>
            </div>

            <!-- Row 2 -->
            <div class="flex gap-8 h-80">
                <div class="flex-1 bg-white/5 border border-white/10 rounded-[48px] p-8 flex items-center gap-8">
                    <img src="https://romualdoag.github.io/desapego-tech/images/macbook_air_m4_24gb/001.JPEG" class="h-64 aspect-square rounded-[32px] object-cover shadow-2xl">
                    <div class="flex flex-col justify-center">
                        <h3 class="text-4xl font-bold text-white mb-2">MacBook Air M4</h3>
                        <p class="text-3xl text-blue-400 font-extrabold italic">R$ 8.000</p>
                    </div>
                </div>
            </div>

            <!-- Row 3 -->
            <div class="flex gap-8 h-80">
                <div class="flex-1 bg-white/5 border border-white/10 rounded-[48px] p-8 flex items-center gap-8">
                    <img src="https://romualdoag.github.io/desapego-tech/images/iphone_15_pro_max_256/IMG_0235.JPEG" class="h-64 aspect-square rounded-[32px] object-cover shadow-2xl">
                    <div class="flex flex-col justify-center">
                        <h3 class="text-4xl font-bold text-white mb-2">iPhone 15 Pro Max</h3>
                        <p class="text-3xl text-blue-400 font-extrabold italic">R$ 4.900</p>
                    </div>
                </div>
            </div>

            <!-- Grid for smaller items -->
            <div class="grid grid-cols-2 gap-8">
                <div class="bg-white/5 border border-white/10 rounded-[48px] p-8 flex flex-col items-center text-center">
                    <img src="https://romualdoag.github.io/desapego-tech/images/airpods_max/IMG_2480.JPEG" class="w-full aspect-square rounded-[32px] object-cover mb-6">
                    <h3 class="text-3xl font-bold text-white mb-2 line-clamp-1">AirPods Max</h3>
                    <p class="text-3xl text-blue-400 font-extrabold italic">R$ 2.800</p>
                </div>
                <div class="bg-white/5 border border-white/10 rounded-[48px] p-8 flex flex-col items-center text-center">
                    <img src="https://romualdoag.github.io/desapego-tech/images/airpods_pro_2/IMG_0237.JPEG" class="w-full aspect-square rounded-[32px] object-cover mb-6">
                    <h3 class="text-3xl font-bold text-white mb-2 line-clamp-1">AirPods Pro 2</h3>
                    <p class="text-3xl text-blue-400 font-extrabold italic">R$ 900</p>
                </div>
            </div>
        </div>

        <!-- Footer / Widget Area -->
        <div class="relative z-10 pt-12 pb-32 px-16 text-center bg-gradient-to-t from-black to-transparent">
            <p class="text-3xl text-zinc-500 font-bold uppercase tracking-[0.2em] mb-12">
                👇 Clique abaixo para o catálogo 👇
            </p>
            <!-- Space for Instagram Link Widget -->
            <div class="h-24 w-full bg-white/5 border-2 border-dashed border-white/20 rounded-3xl flex items-center justify-center">
                <span class="text-white/20 text-3xl font-bold uppercase">Área do Link Widget</span>
            </div>
        </div>
    </div>

</body>
</html>
