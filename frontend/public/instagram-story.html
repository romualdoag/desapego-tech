<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Stories Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #000;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .story-canvas {
            width: 1080px;
            height: 1920px;
            background: linear-gradient(180deg, #09090b 0%, #000000 100%);
            position: relative;
            overflow: hidden;
            display: grid;
            grid-template-rows: 350px 1fr 350px; /* Rigid structure: Header, Content, Footer */
        }
        .glow {
            position: absolute;
            width: 1000px;
            height: 1000px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.1) 0%, rgba(0,0,0,0) 70%);
            z-index: 0;
        }
    </style>
</head>
<body>

    <div id="story" class="story-canvas shadow-2xl">
        <div class="glow top-[-200px] left-[-200px]"></div>

        <!-- Section 1: Header -->
        <div class="relative z-10 flex flex-col items-center justify-end pb-10">
            <h1 class="text-[110px] font-extrabold text-white leading-[0.85] tracking-tighter text-center">
                Desapegos <br> <span class="text-blue-500">do Mumu</span>
            </h1>
        </div>

        <!-- Section 2: Products -->
        <div class="relative z-10 px-10 flex flex-col gap-6 justify-center">
            
            <!-- Mac Mini -->
            <div class="bg-white/5 border border-white/10 rounded-[40px] p-6 flex items-center gap-8 h-[240px]">
                <img src="https://romualdoag.github.io/desapego-tech/images/mac_mini_m4/IMG_2011.JPEG" class="h-40 aspect-square rounded-[24px] object-cover shadow-2xl">
                <div class="flex flex-col">
                    <h3 class="text-4xl font-bold text-white mb-1">Mac Mini M4 + Dock</h3>
                    <p class="text-5xl text-blue-400 font-black italic">R$ 9.000</p>
                </div>
            </div>

            <!-- MacBook Air -->
            <div class="bg-white/5 border border-white/10 rounded-[40px] p-6 flex items-center gap-8 h-[240px]">
                <img src="https://romualdoag.github.io/desapego-tech/images/macbook_air_m4_24gb/001.JPEG" class="h-40 aspect-square rounded-[24px] object-cover shadow-2xl">
                <div class="flex flex-col">
                    <h3 class="text-4xl font-bold text-white mb-1">MacBook Air M4</h3>
                    <p class="text-5xl text-blue-400 font-black italic">R$ 8.000</p>
                </div>
            </div>

            <!-- iPhone -->
            <div class="bg-white/5 border border-white/10 rounded-[40px] p-6 flex items-center gap-8 h-[240px]">
                <img src="https://romualdoag.github.io/desapego-tech/images/iphone_15_pro_max_256/IMG_0235.JPEG" class="h-40 aspect-square rounded-[24px] object-cover shadow-2xl">
                <div class="flex flex-col">
                    <h3 class="text-4xl font-bold text-white mb-1">iPhone 15 Pro Max</h3>
                    <p class="text-5xl text-blue-400 font-black italic">R$ 4.900</p>
                </div>
            </div>

            <!-- Small Items Grid -->
            <div class="grid grid-cols-2 gap-6">
                <div class="bg-white/5 border border-white/10 rounded-[40px] p-6 flex flex-col items-center text-center h-[340px] justify-center">
                    <img src="https://romualdoag.github.io/desapego-tech/images/airpods_max/IMG_2480.JPEG" class="w-32 aspect-square rounded-[20px] object-cover mb-4">
                    <h3 class="text-3xl font-bold text-white mb-1">AirPods Max</h3>
                    <p class="text-4xl text-blue-400 font-black italic">R$ 2.800</p>
                </div>
                <div class="bg-white/5 border border-white/10 rounded-[40px] p-6 flex flex-col items-center text-center h-[340px] justify-center">
                    <img src="https://romualdoag.github.io/desapego-tech/images/airpods_pro_2/IMG_0237.JPEG" class="w-32 aspect-square rounded-[20px] object-cover mb-4">
                    <h3 class="text-3xl font-bold text-white mb-1">AirPods Pro 2</h3>
                    <p class="text-4xl text-blue-400 font-black italic">R$ 900</p>
                </div>
            </div>
        </div>

        <!-- Section 3: Footer -->
        <div class="relative z-10 flex flex-col items-center justify-start pt-10 px-16">
            <p class="text-3xl text-zinc-500 font-bold uppercase tracking-[0.4em] mb-10">
                👇 Clique abaixo 👇
            </p>
            <div class="h-28 w-full border-2 border-dashed border-white/20 rounded-[32px] flex items-center justify-center bg-white/5">
                <span class="text-white/10 text-3xl font-bold uppercase tracking-widest text-center px-4">Área do Link Widget</span>
            </div>
        </div>
    </div>

</body>
</html>
