<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Story 01 — Desapego Tech</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #000;
            display: flex;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }

        .story-canvas {
            width: 1080px;
            height: 1920px;
            background: #09090b;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .glow-top {
            position: absolute;
            width: 900px;
            height: 900px;
            top: -300px;
            left: -200px;
            background: radial-gradient(circle, rgba(251,191,36,0.08) 0%, transparent 70%);
            pointer-events: none;
        }
        .glow-bottom {
            position: absolute;
            width: 700px;
            height: 700px;
            bottom: -200px;
            right: -100px;
            background: radial-gradient(circle, rgba(251,191,36,0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        /* Header */
        .header-zone {
            position: relative;
            z-index: 10;
            padding: 80px 80px 50px;
            flex-shrink: 0;
        }

        .page-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(251,191,36,0.1);
            border: 1px solid rgba(251,191,36,0.25);
            border-radius: 100px;
            padding: 10px 24px;
            margin-bottom: 32px;
        }
        .page-badge span {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 22px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #fbbf24;
        }
        .page-badge-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #fbbf24;
        }

        .headline {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 100px;
            line-height: 0.92;
            letter-spacing: -0.03em;
            color: #fafaf9;
            text-transform: uppercase;
        }
        .headline .accent { color: #fbbf24; }

        .sub-headline {
            margin-top: 24px;
            font-size: 28px;
            font-weight: 400;
            color: #52525b;
        }

        /* Grid */
        .grid-zone {
            position: relative;
            z-index: 10;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 28px;
            padding: 0 80px;
        }

        /* Hero card — full width, landscape */
        .hero-card {
            background: rgba(251,191,36,0.05);
            border: 1px solid rgba(251,191,36,0.2);
            border-radius: 48px;
            padding: 44px 52px;
            display: flex;
            align-items: center;
            gap: 52px;
            flex: 1.4;
        }

        .hero-image {
            width: 360px;
            height: 360px;
            border-radius: 36px;
            object-fit: cover;
            box-shadow: 0 30px 60px rgba(0,0,0,0.7);
            flex-shrink: 0;
        }

        .hero-text {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(251,191,36,0.15);
            border: 1px solid rgba(251,191,36,0.3);
            border-radius: 100px;
            padding: 6px 18px;
            width: fit-content;
            margin-bottom: 4px;
        }
        .hero-badge span {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 20px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #fbbf24;
        }

        .hero-name {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 52px;
            line-height: 1.0;
            color: #fafaf9;
        }

        .hero-spec {
            font-size: 28px;
            font-weight: 500;
            color: #52525b;
        }

        .hero-price {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 60px;
            letter-spacing: -0.02em;
            color: #fbbf24;
            margin-top: 8px;
        }

        /* Small cards row */
        .small-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 28px;
            flex: 1;
        }

        .product-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 44px;
            padding: 36px 28px 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .product-image {
            width: 280px;
            height: 280px;
            border-radius: 32px;
            object-fit: cover;
            margin-bottom: 24px;
            box-shadow: 0 24px 48px rgba(0,0,0,0.7);
        }

        .product-name {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 34px;
            color: #fafaf9;
            line-height: 1.1;
            margin-bottom: 6px;
        }

        .product-spec {
            font-size: 24px;
            font-weight: 500;
            color: #52525b;
            margin-bottom: 12px;
        }

        .product-price {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 40px;
            letter-spacing: -0.02em;
            color: #fbbf24;
        }

        /* Footer */
        .footer-zone {
            position: relative;
            z-index: 10;
            padding: 36px 80px 72px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            flex-shrink: 0;
        }

        .cta-text {
            font-family: 'Syne', sans-serif;
            font-size: 30px;
            font-weight: 700;
            color: #3f3f46;
            text-transform: uppercase;
            letter-spacing: 0.25em;
        }

        .link-area {
            width: 100%;
            height: 100px;
            border: 1.5px dashed rgba(255,255,255,0.12);
            border-radius: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.02);
        }
        .link-area span {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 24px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.08);
        }

        .page-counter {
            position: absolute;
            top: 64px;
            right: 80px;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 28px;
            letter-spacing: 0.08em;
            color: rgba(255,255,255,0.2);
            z-index: 20;
        }
    </style>
</head>
<body>

<div class="story-canvas">
    <div class="glow-top"></div>
    <div class="glow-bottom"></div>
    <div class="page-counter">01 / 02</div>

    <div class="header-zone">
        <div class="page-badge">
            <div class="page-badge-dot"></div>
            <span>Curadoria exclusiva</span>
        </div>
        <h1 class="headline">
            Desapegos<br>
            <span class="accent">do Mumu</span>
        </h1>
        <p class="sub-headline">Eletrônicos de alto padrão · Procedência garantida</p>
    </div>

    <div class="grid-zone">
        <!-- Hero: MacBook Air M4 -->
        <div class="hero-card">
            <img src="https://romualdoag.github.io/desapego-tech/images/macbook_air_m4_24gb/001.JPEG" class="hero-image" alt="MacBook Air M4">
            <div class="hero-text">
                <div class="hero-badge"><span>✦ Destaque</span></div>
                <p class="hero-name">MacBook Air M4</p>
                <p class="hero-spec">24GB RAM · 512GB · 100% bateria</p>
                <p class="hero-price">R$ 8.800</p>
            </div>
        </div>

        <!-- Small row -->
        <div class="small-row">
            <div class="product-card">
                <img src="https://romualdoag.github.io/desapego-tech/images/mac_mini_m4/IMG_2011.JPEG" class="product-image" alt="Mac Mini M4">
                <p class="product-name">Mac Mini M4</p>
                <p class="product-spec">16GB · 256GB</p>
                <p class="product-price">R$ 6.000</p>
            </div>
            <div class="product-card">
                <img src="https://romualdoag.github.io/desapego-tech/images/olympus_em10_mark_iv/IMG_2491.JPEG" class="product-image" alt="Olympus E-M10">
                <p class="product-name">Olympus E-M10</p>
                <p class="product-spec">Lente 14-42mm EZ</p>
                <p class="product-price">R$ 4.600</p>
            </div>
        </div>
    </div>

    <div class="footer-zone">
        <p class="cta-text">👇 Clique abaixo para ver tudo 👇</p>
        <div class="link-area">
            <span>Área do Link</span>
        </div>
    </div>
</div>

</body>
</html>
