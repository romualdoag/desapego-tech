<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Stories Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #000;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }
        .story-canvas {
            width: 1080px;
            height: 1920px;
            background: linear-gradient(180deg, #09090b 0%, #000000 100%);
            position: relative;
            overflow: hidden;
            display: grid;
            grid-template-rows: 280px 1fr 350px; /* Header, Content, Fixed Footer */
        }
        .glow {
            position: absolute;
            width: 1000px;
            height: 1000px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, rgba(0,0,0,0) 70%);
            z-index: 0;
        }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 30px;
            padding: 0 50px;
        }
        .product-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-shadow: inset 0 0 40px rgba(255,255,255,0.02);
        }
        .product-image {
            width: 290px;
            aspect-ratio: 1;
            border-radius: 35px;
            object-fit: cover;
            margin-bottom: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .price-tag {
            color: #60a5fa;
            font-weight: 900;
            font-style: italic;
            font-size: 40px;
            letter-spacing: -0.02em;
        }
        .product-name {
            color: white;
            font-weight: 700;
            font-size: 32px;
            margin-bottom: 4px;
            line-height: 1.1;
        }
        .product-spec {
            color: #94a3b8;
            font-weight: 600;
            font-size: 24px;
            margin-bottom: 8px;
        }
        /* Emphasis for High-Value Items */
        .emphasis {
            background: rgba(59, 130, 246, 0.08);
            border-color: rgba(59, 130, 246, 0.3);
        }
    </style>
</head>
<body>

    <div id="story" class="story-canvas shadow-2xl">
        <div class="glow top-[-200px] left-[-200px]"></div>
        <div class="glow bottom-[-200px] right-[-200px]"></div>

        <!-- Section 1: Header -->
        <div class="relative z-10 flex flex-col items-center justify-center pt-10">
            <h1 class="text-[80px] font-extrabold text-white leading-[1] tracking-tighter text-center uppercase">
                Desapegos <span class="text-blue-500">do Mumu</span>
            </h1>
            <div class="mt-4 h-1 w-20 bg-blue-500/50 rounded-full"></div>
        </div>

        <!-- Section 2: Product Grid -->
        <div class="relative z-10 product-grid">
            
            <!-- MacBook Air -->
            <div class="product-card emphasis">
                <img src="https://romualdoag.github.io/desapego-tech/images/macbook_air_m4_24gb/001.JPEG" class="product-image">
                <h3 class="product-name">MacBook Air M4</h3>
                <p class="product-spec">24GB RAM</p>
                <p class="price-tag">R$ 8.000</p>
            </div>

            <!-- iPhone 15 Pro Max -->
            <div class="product-card emphasis">
                <img src="https://romualdoag.github.io/desapego-tech/images/iphone_15_pro_max_256/IMG_0235.JPEG" class="product-image">
                <h3 class="product-name">iPhone 15 PM</h3>
                <p class="product-spec">256GB • Azul</p>
                <p class="price-tag">R$ 4.900</p>
            </div>

            <!-- Mac Mini -->
            <div class="product-card">
                <img src="https://romualdoag.github.io/desapego-tech/images/mac_mini_m4/IMG_2011.JPEG" class="product-image">
                <h3 class="product-name">Mac Mini M4</h3>
                <p class="product-spec">16GB / 1TB Exp.</p>
                <p class="price-tag">R$ 9.000</p>
            </div>

            <!-- AirPods Max -->
            <div class="product-card">
                <img src="https://romualdoag.github.io/desapego-tech/images/airpods_max/IMG_2480.JPEG" class="product-image">
                <h3 class="product-name">AirPods Max</h3>
                <p class="product-spec">USB-C • Midnight</p>
                <p class="price-tag">R$ 2.800</p>
            </div>

            <!-- Olympus Camera -->
            <div class="product-card">
                <img src="https://romualdoag.github.io/desapego-tech/images/olympus_em10_mark_iv/IMG_2491.JPEG" class="product-image">
                <h3 class="product-name">Olympus E-M10</h3>
                <p class="product-spec">Lente 14-42mm</p>
                <p class="price-tag">R$ 5.200</p>
            </div>

            <!-- AirPods Pro 2 -->
            <div class="product-card">
                <img src="https://romualdoag.github.io/desapego-tech/images/airpods_pro_2/IMG_0237.JPEG" class="product-image">
                <h3 class="product-name">AirPods Pro 2</h3>
                <p class="product-spec">Lightning</p>
                <p class="price-tag">R$ 900</p>
            </div>
        </div>

        <!-- Section 3: Footer (Restored Link Area) -->
        <div class="relative z-10 flex flex-col items-center justify-start pt-10 px-16">
            <p class="text-3xl text-zinc-500 font-bold uppercase tracking-[0.4em] mb-10">
                👇 Clique abaixo 👇
            </p>
            <div class="h-28 w-full border-2 border-dashed border-white/20 rounded-[32px] flex items-center justify-center bg-white/5">
                <span class="text-white/10 text-3xl font-bold uppercase tracking-widest text-center px-4">Área do Link Widget</span>
            </div>
        </div>
    </div>

</body>
</html>
